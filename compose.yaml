services:
  web:
    image: ${PFA_WEB_IMAGE:-ghcr.io/daniel-brodsky/protected-file-analyzer-docker-web:0.1.0}
    env_file:
      - .env
    environment:
      PFA_BIND_HOST: 0.0.0.0
      PFA_BIND_PORT: 8088
      PFA_DATA_ROOT: /data/jobs
      PFA_WORDLISTS_DIR: /data/wordlists
      PFA_YARA_RULES_PATH: /app/src/protected_file_analyzer/rules/basic_static.yar
    ports:
      - "${PFA_BIND_HOST:-127.0.0.1}:${PFA_BIND_PORT:-8088}:8088"
    user: "10001:${PFA_RUNTIME_GID:-10001}"
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cpus: ${PFA_WEB_CPU_LIMIT:-1.0}
    mem_limit: ${PFA_WEB_MEMORY_LIMIT:-768m}
    pids_limit: ${PFA_WEB_PIDS_LIMIT:-256}
    volumes:
      - ./runtime/jobs:/data/jobs
      - ./runtime/wordlists:/data/wordlists
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8088/api/health', timeout=5)\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    image: ${PFA_WORKER_IMAGE:-ghcr.io/daniel-brodsky/protected-file-analyzer-docker-worker:0.1.0}
    env_file:
      - .env
    environment:
      PFA_DATA_ROOT: /data/jobs
      PFA_WORDLISTS_DIR: /data/wordlists
      PFA_YARA_RULES_PATH: /app/src/protected_file_analyzer/rules/basic_static.yar
      PFA_TOOL_RUNNER_BACKEND: ${PFA_TOOL_RUNNER_BACKEND:-local}
    user: "10001:${PFA_RUNTIME_GID:-10001}"
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cpus: ${PFA_WORKER_CPU_LIMIT:-2.0}
    mem_limit: ${PFA_WORKER_MEMORY_LIMIT:-2g}
    pids_limit: ${PFA_WORKER_PIDS_LIMIT:-512}
    volumes:
      - ./runtime/jobs:/data/jobs
      - ./runtime/wordlists:/data/wordlists
    network_mode: none
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from pathlib import Path; import sys; sys.exit(0 if Path('/app/src/protected_file_analyzer/worker_daemon.py').exists() else 1)\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
