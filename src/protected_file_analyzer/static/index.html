<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ניתוח קבצים מוגנים</title>
  <link rel="stylesheet" href="/styles.css?v=20260713e">
</head>
<body>
  <main class="shell">
    <header class="hero">
      <div>
        <span class="eyebrow">ניתוח סטטי מאובטח</span>
        <h1>ניתוח קבצים מוגנים</h1>
        <p>הכלי נועד לנתח סטטית קבצים מוגנים בסיסמא, תוך שמירה על אבטחת המידע.</p>
      </div>
      <div id="health" class="health pending">בודק יכולות…</div>
    </header>

    <section class="card">
      <form id="job-form">
        <label class="dropzone" for="protected-file">
          <strong>קובץ מוגן</strong>
          <span>ZIP, 7z, PDF או Microsoft Office</span>
          <input id="protected-file" name="protected_file" type="file" required>
        </label>

        <label class="authorization">
          <input name="authorization_confirmed" type="checkbox" value="true" required>
          אני מאשר/ת שיש לי הרשאה לנתח את הקובץ המוגן הזה.
        </label>

        <button id="submit" type="submit">התחלת ניתוח</button>
      </form>
    </section>

    <section id="progress-card" class="card hidden">
      <div class="row between">
        <h2>התקדמות הניתוח</h2>
        <div class="row progress-actions">
          <button id="cancel-job" class="danger hidden" type="button">ביטול הניתוח</button>
          <span id="status-badge" class="badge status-badge">ממתין</span>
        </div>
      </div>
      <div class="progress"><div id="progress-bar"></div></div>
      <p id="status-message" class="status-message"></p>

      <div id="stage-progress" class="stage-progress">
        <div class="stage-card" data-stage="preparing">
          <div class="stage-head"><span>Preparing</span><strong data-stage-value="preparing">0%</strong></div>
          <div class="mini-progress"><div data-stage-bar="preparing"></div></div>
        </div>
        <div class="stage-card" data-stage="recovering_access">
          <div class="stage-head"><span>Recovering access</span><strong data-stage-value="recovering_access">0%</strong></div>
          <div class="mini-progress"><div data-stage-bar="recovering_access"></div></div>
        </div>
        <div class="stage-card" data-stage="decrypting">
          <div class="stage-head"><span>Decrypting</span><strong data-stage-value="decrypting">0%</strong></div>
          <div class="mini-progress"><div data-stage-bar="decrypting"></div></div>
        </div>
        <div class="stage-card" data-stage="static_analysis">
          <div class="stage-head"><span>Static analysis</span><strong data-stage-value="static_analysis">0%</strong></div>
          <div class="mini-progress"><div data-stage-bar="static_analysis"></div></div>
        </div>
        <div class="stage-card" data-stage="completed">
          <div class="stage-head"><span>Completed</span><strong data-stage-value="completed">0%</strong></div>
          <div class="mini-progress"><div data-stage-bar="completed"></div></div>
        </div>
      </div>

      <div class="timeline" id="timeline"></div>
    </section>

    <section id="result-card" class="card hidden">
      <h2>ממצאים</h2>
      <div id="summary-grid" class="summary-grid"></div>
      <div class="actions">
        <a id="artifact-link" class="button secondary" href="#">הורדת artifact מפוענח</a>
        <a id="report-link" class="button secondary" href="#">הורדת דוח JSON</a>
        <button id="delete-job" class="danger" type="button">מחיקת הניתוח</button>
      </div>
      <section class="card nested-card">
        <h3>כרטיסי כלים</h3>
        <div id="tool-cards" class="tool-cards"></div>
      </section>
      <details>
        <summary>דוח JSON מלא</summary>
        <pre id="report-json"></pre>
      </details>
    </section>

  </main>
  <script src="/app.js?v=20260713e" defer></script>
</body>
</html>
